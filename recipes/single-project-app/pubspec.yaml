name: single_project_app
description: terradart cookbook recipe — single-project Cloud Run + Cloud SQL + Pub/Sub + Monitoring webhook stack. Sample uses "coffee shop" naming inside but the recipe pattern is "1 GCP project, end-to-end app surface".
homepage: https://github.com/nozomi-koborinai/terradart-cookbook
repository: https://github.com/nozomi-koborinai/terradart-cookbook
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.6.0

dependencies:
  # Path override pinned to terradart's `v0.9.0-polish-wave` branch checkout
  # (the main terradart repo on this machine must have the polish-wave branch
  # checked out for `dart pub get` to succeed). Switch to hosted `^0.9.0`
  # once v0.9.0 publishes on pub.dev.
  terradart_core:
    path: ../../../terradart/packages/terradart_core
  terradart_google:
    path: ../../../terradart/packages/terradart_google

dev_dependencies:
  lints: ^6.0.0
